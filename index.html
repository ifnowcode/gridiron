<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- <meta name=viewport content='width=device-width,initial-scale=1,user-scalable=0'> -->
<title>Gridiron Canvas</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: #222;
    color: #eee;
    font-family: system-ui, sans-serif;
    display: flex;
    justify-content: center;
  }

  #container {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    width: 100%;
    max-width: 900px;
  }

  canvas {
    background: #064;
    border: 3px solid #444;
    margin-bottom: 20px;
  }

  #buttonBar {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
  }

  button {
    padding: 8px 16px;
    font-size: 16px;
    cursor: pointer;
  }

  #status {
    font-size: 18px;
    text-align: center;
    min-height: 28px;
  }
  
</style>

</head>
<body>

<div id="container">

  <!-- Canvas on top -->
  <canvas id="gameCanvas" width="860" height="460"></canvas>

  <!-- Button bar below -->
  <div id="buttonBar">
    <button id="restartBtn">Restart</button>
    <label style="margin-left: 10px;">
      <input type="checkbox" id="autoPlay">
      Auto Play
    </label>
    <button id="rollBtn">Roll</button>
    <label style="margin-left: 10px;">
      <input type="checkbox" id="autoRoll">
      Auto Roll
    </label>
    <button id="passBtn">Pass</button>
    
    <label style="margin-left: 10px;">
      Formation:
      <select id="formationSelect">
        <option value="diamond">Diamond</option>
        <option value="tugofwar">Tug Of War</option>
        <option value="tight">Tight</option>
        <option value="line5">Line5</option>
        <option value="spread">Spread</option>
        <option value="line7">Line7</option>
        <option value="sevenfive">Seven Five</option>
        <option value="pyramid">Pyramid</option>
        <option value="gridiron">Gridiron</option>
        <option value="faceoff">Face Off</option>
        <option value="blitz">Blitz</option>
        <option value="suicide">Suicide</option>
        <option value="defender">Defender</option>
        <option value="moshpit">Mosh Pit</option>
        <option value="gauntlet">Gauntlet</option>
        <option value="dragon">Dragon</option>
        <option value="blockout">Blockout</option>
        <option value="fubar">Fubar</option>
        <option value="first">First</option>
        <option value="basketball">Basketball</option>
        <option value="test">Test</option>
      </select>
    </label>
    
    <label style="margin-left: 10px;">
      Difficulty:
      <select id="difficultySelect">
        <option value="0">0</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
      </select>
    </label>
    
    <label style="margin-left: 10px;">
      Mode:
      <select id="modeSelect">
        <option value="classic">Classic</option>
        <option value="deathmatch">Death Match</option>
      </select>
    </label>
    
    <label style="margin-left: 10px;">
      Ball:
      <select id="ballSelect">
        <option value="football">🏈</option>
        <option value="soccerball">⚽</option>
        <option value="basketball">🏀</option>
        <option value="vollyball">🏐</option>
        <option value="mirrorball">🪩</option>
        <option value="fireball">🔥</option>
        <option value="moonrock">🌕</option>
        <option value="cookie">🍪</option>
        <option value="moneybag">💰</option>
        <option value="skull">💀</option>
        <option value="skullnbones">☠️</option>
        <option value="earth">🌍</option>
        <option value="poo">💩</option>
        <option value="trophy">🏆</option>
        <option value="biohazard">☢️</option>
        <option value="ball">🟡</option>
        <option value="block">🟨</option>
        <option value="crown">👑</option>
        <option value="star">⭐</option>
        <option value="diamond">💎</option>
        <option value="rainbow">🌈</option>
        <option value="key">🔑</option>
        <option value="flower">🏵️</option>
        <option value="goldcard">💳</option>
        <option value="world">🌐</option>
      </select>
    </label>
  </div>

  <!-- Status/output text below -->
  <div id="status"></div>

</div>

<script src="resources.js"></script>
<script src="gridiron.js"></script>
</body>
</html>
